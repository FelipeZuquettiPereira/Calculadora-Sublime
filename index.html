<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    

    <div class="carcaca">
       
       <div class="tela" id="tela"></div>
        
       <div>
        <button class="botao1" onclick="Numero1('1')"><b><h1>1</h1></b></button>
        <button class="botao1" onclick="Numero1('2')"><b><h1>2</h1></b></button>
        <button class="botao1" onclick="Numero1('3')"><b><h1>3</h1></b></button>
        <button class="botao1" onclick="Numero1('%')"><b><h1>%</h1></b></button>
       </div>
       
       <div>
        <button class="botao1" onclick="Numero1('4')"><b><h1>4</h1></b></button>
        <button class="botao1" onclick="Numero1('5')"><b><h1>5</h1></b></button>
        <button class="botao1" onclick="Numero1('6')"><b><h1>6</h1></b></button>
        <button class="botao1" onclick="Numero1('-')"><b><h1>-</h1></b></button>
       </div>

       <div>
        <button class="botao1" onclick="Numero1('7')"><b><h1>7</h1></b></button>
        <button class="botao1" onclick="Numero1('8')"><b><h1>8</h1></b></button>
        <button class="botao1" onclick="Numero1('9')"><b><h1>9</h1></b></button>
        <button class="botao1" onclick="Numero1('+')"><b><h1>+</h1></b></button>
       </div>

       <div>
       <button class="botao1" onclick="Numero1('0')"><b><h1>0</h1></b></button>
        <button class="botao1" onclick="Numero1('Nao')"><b><h1>Nao</h1></b></button>
        <button class="botao1" onclick="reset('C')"><b><h1>C</h1></b></button>
        <button class="botao1" onclick="Numero1('=')"><b><h1>=</h1></b></button>
       </div>
        
       <script src="Javas/Calculadora1.js"></script>

    </div>
</body>
</html>
